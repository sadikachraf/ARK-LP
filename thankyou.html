    body {
      margin: 0;
      font-family: 'Noto Kufi Arabic', Cairo, sans-serif;
      background: linear-gradient(135deg, #fdfbf7 0%, #f4f1ea 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #ffffff;
      max-width: 480px;
      width: 100%;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      padding: 40px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #d1fae5;
      color: #1f7a46;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 20px;
      box-shadow: 0 4px 15px rgba(31, 122, 70, 0.2);
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    h1 {
      color: #1a1a1a;
      font-size: 26px;
      font-weight: 800;
      margin: 0 0 10px;
      letter-spacing: -0.5px;
    }
    p {
      color: #555;
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 30px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1f7a46, #2d6a4f);
      color: #fff;
      text-decoration: none;
      padding: 14px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(31, 122, 70, 0.3);
      transition: all 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(31, 122, 70, 0.4);
    }
    .btn:active {
      transform: translateY(0);
    }
  </style>

  <script>
    // Fire Purchase Events based on URL parameters
    window.onload = function() {
      var params = new URLSearchParams(window.location.search);
      var orderValue = params.get('value') || 299;
      var pkgName = params.get('pkg') || 'ARK Drops';
      var qty = params.get('qty') || 1;
      
      var valNum = parseFloat(orderValue);
      var qtyNum = parseInt(qty);

      // TikTok Purchase Event
      if(typeof ttq !== 'undefined') {
        ttq.track('Purchase', {
          content_name: pkgName,
          quantity: qtyNum,
          value: valNum,
          currency: 'SAR'
        });
      }

      // Meta Purchase Event
      if(typeof fbq !== 'undefined') {
        fbq('track', 'Purchase', {
          value: valNum,
          currency: 'SAR',
          content_name: pkgName,
          content_type: 'product',
          num_items: qtyNum
        });
      }

      // Snapchat Purchase Event
      if(typeof snaptr !== 'undefined') {
        snaptr('track', 'PURCHASE', {
          price: valNum,
          currency: 'SAR',
          item_category: 'ARK Drops'
        });
      }
    };
  </script>
